<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Weather_Dashboard</h1>

        <div class="search-box">
            <input
                type="text"
                id="cityInput"
                placeholder="Enter city name..."
            >
            <button id="searchBtn">Search</button>
        </div>

        <div id="weatherCard" class="weather-card hidden">
            <h2 id="city"></h2>
            <p id="description"></p>

            <div class="weather-info">
                <div class="info">
                    <h3>🌡 Temperature</h3>
                    <p id="temperature"></p>
                </div>

                <div class="info">
                    <h3>💧 Humidity</h3>
                    <p id="humidity"></p>
                </div>

                <div class="info">
                    <h3>🌬 Wind Speed</h3>
                    <p id="wind"></p>
                </div>
            </div>
        </div>

        <p id="error"></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
